name: Release binaries

# Builds a standalone executable per target OS/arch and attaches the artifacts
# to a published GitHub Release. Runs in parallel with `publish.yml` (npm +
# MCP registry) on the same `release.published` trigger — binary users and
# npm users both consume the same version.
#
# Implementation notes for future-me:
#   - `@yao-pkg/pkg` is a community-maintained fork of Vercel's pkg. It
#     bundles the Node runtime + our dist + all deps + native `.node`
#     artifacts into one executable per target.
#   - Cross-compile from Linux → macOS / Windows does NOT work for this
#     project: `node-hid` builds from source via `node-gyp` and its
#     `.node` output is OS-specific. So we build each target on its own
#     OS and let `npm ci` rebuild `node-hid` for that platform before
#     `pkg` picks it up via the `pkg.assets` glob in package.json.
#   - macOS arm64 runs on `macos-14` (Apple silicon); macOS x64 runs on
#     `macos-13` (Intel). Node 22 is available on both.
#   - `workflow_dispatch` is included so we can rebuild binaries for a
#     past release without re-publishing the tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build binaries for (e.g. v0.6.1). Used when triggered manually."
        required: true
        type: string

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Each platform produces TWO binaries — one for the MCP server
        # (entry: dist/index.js) and one for the setup wizard (entry:
        # dist/setup.js). @yao-pkg/pkg bundles only a single entry per
        # binary, and the setup wizard has side-effectful top-level code
        # that can't be reliably merged into the server entry via
        # dynamic import under pkg's ESM→CJS transformer. Two binaries
        # keeps both users (MCP runtime, first-run wizard) on the
        # zero-node-install path with no fragile dispatching.
        # Asset names follow `vaultpilot-mcp-<platform>-<arch>-<role>` so
        # the GitHub Releases page (which sorts assets alphabetically)
        # shows the server + setup binaries for each platform adjacent
        # to each other rather than scattered. The previous shape put
        # `setup` BETWEEN platforms when sorted, which made the page
        # harder to scan for users picking one platform.
        include:
          - target: node22-linux-x64
            runner: ubuntu-latest
            server_asset: vaultpilot-mcp-linux-x64-server
            setup_asset: vaultpilot-mcp-linux-x64-setup
          - target: node22-macos-x64
            runner: macos-13
            server_asset: vaultpilot-mcp-macos-x64-server
            setup_asset: vaultpilot-mcp-macos-x64-setup
          - target: node22-macos-arm64
            runner: macos-14
            server_asset: vaultpilot-mcp-macos-arm64-server
            setup_asset: vaultpilot-mcp-macos-arm64-setup
          - target: node22-win-x64
            runner: windows-latest
            server_asset: vaultpilot-mcp-windows-x64-server.exe
            setup_asset: vaultpilot-mcp-windows-x64-setup.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Prefer the release tag on `release.published`, fall back to
          # the manual-dispatch input. `github.ref` on manual runs is
          # the branch, which is not what we want for a release asset.
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        # Kamino SDK's transitive peer-dep nest requires legacy resolution
        # — mirrors publish.yml. `npm ci` rebuilds node-hid from source
        # against the current OS toolchain, producing the `.node` that
        # `pkg` will bundle in the next step.
        run: npm ci --legacy-peer-deps

      - name: Build dist/
        run: npm run build

      - name: Prune devDependencies before pkg snapshot
        # `npm ci` above installs deps + devDeps (we need typescript etc. for
        # `npm run build`). Once dist/ is built, drop the devDeps so pkg
        # doesn't snapshot them. vitest pulls in @rolldown (45MB binding) and
        # lightningcss (~20MB) transitively — neither is reachable from the
        # MCP server entry point at runtime, but pkg's static-require walker
        # can't always prove that, so the snapshot grows. Empirically this
        # shaves ~20MB off the binary on linux-x64. Lower output size = faster
        # release-asset upload + less likely to trip GitHub's reverse-proxy
        # idle-timeout on slow runners (root cause of the v0.9.4
        # macos-arm64-server upload failure — issue #330 follow-up).
        run: npm prune --omit=dev --legacy-peer-deps

      - name: Bundle server binary
        # `pkg .` (not `pkg dist/index.js`) so pkg picks up package.json
        # context including the `pkg.scripts` glob and the bin block.
        # The bin block has `vaultpilot-mcp` first, so this builds the
        # MCP server. Direct-entrypoint mode (`pkg dist/index.js`) trips
        # an ESM exports-map resolution bug for subpath imports like
        # `@modelcontextprotocol/sdk/server/mcp.js` — `pkg .` is the
        # supported path.
        #
        # `npx --package=@yao-pkg/pkg pkg` (NOT plain `npx pkg`): the
        # prune step above removed the @yao-pkg/pkg devDep + its `pkg`
        # bin link from node_modules, so plain `npx pkg` falls through
        # to the npm registry and fetches the unrelated deprecated
        # `pkg@5.8.1`, which doesn't support Node 22 at all (`Error! No
        # available node version satisfies 'node22'`). The explicit
        # --package flag tells npx which package to fetch when the bin
        # isn't local.
        run: npx --package=@yao-pkg/pkg pkg . --target ${{ matrix.target }} --output release/${{ matrix.server_asset }}
        env:
          CI: "true"

      - name: Bundle setup binary
        # Direct entrypoint here is fine — setup.js doesn't import any
        # subpath exports from CJS-fallback packages, so the resolution
        # bug above doesn't apply.
        run: npx --package=@yao-pkg/pkg pkg dist/setup.js --target ${{ matrix.target }} --output release/${{ matrix.setup_asset }}
        env:
          CI: "true"

      - name: Mark server binary executable (non-Windows)
        if: runner.os != 'Windows'
        run: chmod +x ./release/${{ matrix.server_asset }}

      - name: Smoke-test server binary
        # One Node script runs identically on Linux / macOS / Windows.
        # The previous per-OS shell snippets relied on GNU `timeout`,
        # which isn't present on macOS by default and would have
        # required `brew install coreutils` — easier to handle process
        # spawn + timeout in Node directly. See
        # `scripts/smoke-test-binary.mjs` for the implementation.
        run: node scripts/smoke-test-binary.mjs ./release/${{ matrix.server_asset }}

      - name: Upload assets to release (with retry on transient 5xx)
        # Replaces softprops/action-gh-release@v2 with `gh release upload`
        # wrapped in a 3-attempt retry. Why: the v0.9.4 release lost
        # vaultpilot-mcp-macos-arm64-server to a GitHub reverse-proxy
        # 5xx ("Unicorn!" page) mid-upload — a transient error that
        # softprops/action-gh-release@v2 surfaces as fatal. macOS runners
        # push large assets at low Mbps; the upload sits near the proxy's
        # idle-timeout edge, and a single retry usually clears it.
        # `gh release upload --clobber` overwrites any stub asset left by
        # a previous attempt so reruns are idempotent. Linear backoff
        # (10s, 20s) is enough for transient API hiccups.
        # `shell: bash` so Windows runners use Git Bash, not pwsh.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          ASSETS=(
            "release/${{ matrix.server_asset }}"
            "release/${{ matrix.setup_asset }}"
          )
          for asset in "${ASSETS[@]}"; do
            for attempt in 1 2 3; do
              if gh release upload "$TAG" "$asset" --clobber; then
                echo "✅ uploaded $asset on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "❌ failed to upload $asset after 3 attempts"
                exit 1
              fi
              backoff=$((attempt * 10))
              echo "↻ upload of $asset failed (attempt $attempt); sleeping ${backoff}s"
              sleep "$backoff"
            done
          done

  # OS-agnostic install scripts — uploaded once per release, not per
  # matrix leg. Hosted at the well-known path
  # `https://github.com/<repo>/releases/latest/download/install.sh`
  # (and `.ps1`) so an LLM-coding agent can run a single command:
  #
  #   curl -fsSL .../install.sh | bash
  #   iwr .../install.ps1 -UseBasicParsing | iex
  #
  # The scripts download the OS+arch-specific server/setup binaries
  # from the same release tag, place them in ~/.local/bin (or
  # %LOCALAPPDATA%\Programs\vaultpilot-mcp), and run the wizard in
  # --non-interactive --json mode. See scripts/install.sh for details.
  #
  # Runs on ubuntu-latest because the scripts are plain text — no
  # cross-OS build needed. Independent of the `build` job (no `needs:`)
  # so a binary-build failure on one OS doesn't suppress the install-
  # script upload; the script is useful even with partial-platform
  # binary coverage (it'll just 404 on the missing target's binary,
  # which is the user's signal that build is in flight).
  upload-install-scripts:
    name: Upload install scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Upload install scripts (with retry)
        # Same retry-with-clobber approach as the binary upload job.
        # Install scripts are small (~10 KB each) so 5xx is rare here,
        # but consistency beats two divergent upload paths.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          ASSETS=(scripts/install.sh scripts/install.ps1)
          for asset in "${ASSETS[@]}"; do
            for attempt in 1 2 3; do
              if gh release upload "$TAG" "$asset" --clobber; then
                echo "✅ uploaded $asset on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "❌ failed to upload $asset after 3 attempts"
                exit 1
              fi
              backoff=$((attempt * 10))
              echo "↻ upload of $asset failed (attempt $attempt); sleeping ${backoff}s"
              sleep "$backoff"
            done
          done
